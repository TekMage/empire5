# Empire 5 — Standard game preset
#
# The classic multi-week game.  Updates every hour.  Players log in once or
# twice a day, plan their moves, set thresholds and delivery chains, and come
# back to see how things played out.  Tech wars develop over days.
# Well-suited for groups of 4-12 players over 1-3 weeks.
#
# Typical game arc:
#   Days  1-3 : infrastructure, first tech, scouting
#   Days  4-7 : military buildup, diplomacy, first wars
#   Days 8-14 : major offensives, alliances shift
#   Day  14+  : endgame or agreed finish

[game]
etu_per_update    = 60
world_x           = 96
world_y           = 64
start_cash        = 20000
newcap_start_civ  = 500
newcap_start_food = 5000

[update]
update_interval_secs = 3600      # 1 hour
allow_force          = true

# ── Rate parameters scaled to etu=60 ──────────────────────────────────────────
#
#   edu_avg  = 8  × etu   →  480
#   hap_avg  = 2  × etu   →  120
#   obrate   = 0.04 / etu →  0.000667  (4% population growth per update)
#   uwbrate  = 0.02 / etu →  0.000333
#
# NOTE: the compiled-in default obrate (0.005) is inherited from 4.4.1 which
# was tuned for etu=8.  At etu=60 that gives 30% growth/update — sectors hit
# maxpop in 2-3 updates and stay there.  The values below give a more gradual
# growth curve matching the feel of classic 4.4.1 play.
#
[rates]
edu_avg  = 480.0      # 8 × 60  (also the compiled-in default for etu=60)
hap_avg  = 120.0      # 2 × 60
obrate   = 0.000667   # 4% civ growth/update
uwbrate  = 0.000333
